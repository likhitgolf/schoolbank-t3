<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบธนาคารโรงเรียน - ข้อมูลบัญชี</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  
  <style>
    :root {
      --card-bg-1: #6a11cb;
      --card-bg-2: #2575fc;
    }
    body {
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
      color: #333;
    }
    .glass-container {
      max-width: 450px;
      margin: 0 auto;
      padding: 20px;
    }
    .virtual-card {
      background: linear-gradient(135deg, var(--card-bg-1) 0%, var(--card-bg-2) 100%);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      color: white;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .sim-chip {
      width: 42px; height: 32px;
      background: linear-gradient(135deg, #f6d365 0%, #ffb347 100%);
      border-radius: 6px;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.4);
    }
    .glass-box {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
      padding: 20px;
      margin-bottom: 20px;
    }
    .timeline-item {
      border-left: 2px solid #cbd5e1;
      padding-left: 15px;
      position: relative;
      margin-bottom: 15px;
    }
    .timeline-item::before {
      content: ''; position: absolute; left: -6px; top: 0;
      width: 10px; height: 10px; border-radius: 50%;
      background: #0d6efd;
    }
    .loading-screen {
      height: 100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
    }

/* ========================================= */
    /* ✨ เอฟเฟกต์แสงสะท้อนสำหรับบัตรพรีเมียม ✨ */
    /* ========================================= */
    .premium-shimmer {
      position: relative;
    }
    .premium-shimmer::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(
        to bottom right,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0) 40%,
        rgba(255, 255, 255, 0.4) 50%,
        rgba(255, 255, 255, 0) 60%,
        rgba(255, 255, 255, 0) 100%
      );
      transform: rotate(30deg);
      animation: shimmerEffect 3s infinite linear;
      pointer-events: none; /* ไม่ให้บังการคลิก */
    }

    @keyframes shimmerEffect {
      0% { transform: translate(-50%, -50%) rotate(30deg); }
      100% { transform: translate(50%, 50%) rotate(30deg); }
    }	
  </style>
</head>
<body>

  <div id="loading-screen" class="loading-screen">
    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
    <h5 class="fw-bold text-primary">กำลังเชื่อมต่อฐานข้อมูล...</h5>
  </div>

  <div id="app-content" class="glass-container" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold text-primary mb-0"><i class="bi bi-bank"></i> School Bank</h4>
    </div>

    <div class="virtual-card">
      <div class="d-flex justify-content-between align-items-start mb-4">
        <div class="d-flex align-items-center gap-3">
          <div class="sim-chip"></div>
          <i class="bi bi-wifi text-light opacity-75 fs-4" style="transform: rotate(90deg);"></i>
        </div>
        <div class="fw-bold text-light opacity-75 fst-italic" style="letter-spacing: 1px;">SCHOOL BANK</div>
      </div>
      
      <div class="mb-4 text-light" id="st-id" style="font-family: 'Courier New', monospace; letter-spacing: 6px; font-size: 1.4rem;">
        000000
      </div>
      
      <div class="d-flex justify-content-between align-items-end">
        <div class="d-flex align-items-center gap-3">
          <div id="st-img" class="rounded-circle border border-2 border-light d-flex justify-content-center align-items-center bg-secondary flex-shrink-0" style="width: 50px; height: 50px; overflow: hidden;">
            <i class="bi bi-person-fill fs-3 text-light"></i>
          </div>
          <div>
            <div class="opacity-50" style="font-size: 0.65rem; text-transform: uppercase;">Cardholder</div>
            <div class="fw-bold" id="st-name" style="font-size: 0.95rem;">กำลังโหลด...</div>
            <div class="opacity-75" id="st-class" style="font-size: 0.75rem;">...</div>
          </div>
        </div>
        <div class="text-end">
          <h3 id="st-balance" class="mb-0 fw-bold" style="color: #48cae4;">฿ 0</h3>
          <div class="opacity-75" style="font-size: 0.7rem;">Available Balance</div>
        </div>
      </div>
    </div>

    <div class="glass-box">
      <div class="fw-bold mb-2 text-primary" id="st-last-active"><i class="bi bi-clock-history"></i> กำลังตรวจสอบ...</div>
      <hr style="opacity: 0.2;">
      <div class="d-flex justify-content-between small text-muted mb-2 fw-bold">
        <span id="badge-text">เป้าหมายต่อไป: ...</span>
        <span id="badge-remain" class="text-info">...</span>
      </div>
      <div class="progress" style="height: 10px; border-radius: 10px;">
        <div id="badge-progress" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 0%;"></div>
      </div>
    </div>

    <div class="glass-box">
      <h6 class="fw-bold text-primary mb-3"><i class="bi bi-receipt"></i> ประวัติทำรายการ 5 ครั้งล่าสุด</h6>
      <div id="statement-list">
        </div>
    </div>
  </div>

  <script>
    // 🌟🌟🌟 สำคัญ: นำลิงก์ Web App จาก Apps Script ของคุณมาใส่ในเครื่องหมายคำพูดด้านล่างนี้ 🌟🌟🌟
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx8LGN5W7-OQyMptN7xV_dI1vq-JTX6YG79JyVZMix864uJ1Djkib6Fe9TMP2vLnDtk/exec"; 

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const studentId = urlParams.get('id');

      if (studentId) {
        fetchStudentData(studentId);
      } else {
        document.getElementById('loading-screen').innerHTML = '<i class="bi bi-qr-code-scan fs-1 text-danger"></i><h4 class="mt-3">กรุณาสแกน QR Code ใหม่อีกครั้ง</h4>';
      }
    };

    function fetchStudentData(id) {
      // วิ่งไปขอข้อมูลจาก Google Apps Script (ส่ง parameter action=getStudent)
      fetch(GAS_API_URL + "?action=getStudent&id=" + id)
        .then(response => response.json())
        .then(data => {
          if(!data) {
            document.getElementById('loading-screen').innerHTML = '<i class="bi bi-x-circle-fill fs-1 text-danger"></i><h4 class="mt-3">ไม่พบข้อมูลบัญชีนี้</h4>';
            return;
          }
          renderUI(data);
        })
        .catch(error => {
          document.getElementById('loading-screen').innerHTML = '<i class="bi bi-exclamation-triangle-fill fs-1 text-danger"></i><h4 class="mt-3">ระบบขัดข้อง กรุณาลองใหม่</h4>';
        });
    }

    function renderUI(data) {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app-content').style.display = 'block';

      let profile = data.profile;
      let statement = data.statement;
      let balance = Number(profile.balance);

      document.getElementById('st-id').innerText = profile.id;
      document.getElementById('st-name').innerText = profile.name;
      document.getElementById('st-class').innerText = "ชั้น " + profile.cls;
      document.getElementById('st-balance').innerText = "฿ " + balance.toLocaleString('th-TH');

      if(profile.imageUrl) {
        document.getElementById('st-img').innerHTML = `<img src="${profile.imageUrl}" style="width:100%; height:100%; object-fit:cover;">`;
      }

      // คำนวณเป้าหมาย (Badge)
      let target = 0, text = "", remain = 0, percent = 0;
      if (balance < 100) { target = 100; text = "ระดับทองแดง 🥉"; }
      else if (balance < 300) { target = 300; text = "ระดับเงิน 🥈"; }
      else if (balance < 500) { target = 500; text = "ระดับทอง 🥇"; }
      else { target = balance; text = "ระดับสูงสุด 🏆"; percent = 100; }

      if(percent !== 100) { percent = (balance / target) * 100; remain = target - balance; }

      document.getElementById('badge-text').innerText = "เป้าหมาย: " + text;
      document.getElementById('badge-remain').innerText = remain > 0 ? `ออมเพิ่ม ฿ ${remain.toLocaleString()}` : "บรรลุเป้าหมายแล้ว!";
      document.getElementById('badge-progress').style.width = percent + "%";

      // 💳 ระบบเปลี่ยนสีบัตรตามระดับเงินออม (Dynamic Card)
      // ==========================================
      let cardEl = document.querySelector('.virtual-card');
      let cardBg1, cardBg2;
      
      // ล้างเอฟเฟกต์พรีเมียมออกก่อน (เผื่อยอดเงินลดลง)
      cardEl.classList.remove('premium-shimmer');

      if (balance < 100) {
        // 🥉 ระดับทองแดง (Bronze)
        cardBg1 = "#c77950"; 
        cardBg2 = "#8a4f31";
        cardEl.style.boxShadow = "0 15px 35px rgba(199, 121, 80, 0.2)";
      } 
      else if (balance < 300) {
        // 🥈 ระดับเงิน (Silver)
        cardBg1 = "#bdc3c7";
        cardBg2 = "#7f8c8d";
        cardEl.style.boxShadow = "0 15px 35px rgba(127, 140, 141, 0.3)";
      } 
      else if (balance < 400) {
        // 🥇 ระดับทอง (Gold)
        cardBg1 = "#e6c27a";
        cardBg2 = "#aa7700";
        cardEl.style.boxShadow = "0 15px 35px rgba(230, 194, 122, 0.4)";
        cardEl.classList.add('premium-shimmer'); // เปิดเอฟเฟกต์แสงสะท้อน
      } 
      else {
        // 🏆 ระดับสูงสุด (Black Card / Diamond)
        cardBg1 = "#1a1a2e";
        cardBg2 = "#16213e";
        cardEl.style.boxShadow = "0 15px 35px rgba(0, 0, 0, 0.6)";
        cardEl.classList.add('premium-shimmer'); // เปิดเอฟเฟกต์แสงสะท้อน
      }

      // สั่งเปลี่ยนตัวแปรสีใน CSS ทันที
      cardEl.style.setProperty('--card-bg-1', cardBg1);
      cardEl.style.setProperty('--card-bg-2', cardBg2);

      // วาดประวัติ 5 รายการล่าสุด
      let stList = document.getElementById('statement-list');
      if (statement && statement.length > 0) {
        // หาว่าเคลื่อนไหวล่าสุดเมื่อไหร่
        let lastDate = new Date(statement[0][0]);
        let diffDays = Math.floor((new Date().setHours(0,0,0,0) - lastDate.setHours(0,0,0,0)) / (1000 * 60 * 60 * 24));
        let activeText = diffDays === 0 ? "วันนี้" : (diffDays === 1 ? "เมื่อวานนี้" : `${diffDays} วันที่แล้ว`);
        document.getElementById('st-last-active').innerHTML = `<i class="bi bi-clock-history"></i> เคลื่อนไหวล่าสุด: ${activeText}`;

        // สร้าง HTML Timeline
        let html = '';
        statement.slice(0, 5).forEach(row => {
          let dateStr = new Date(row[0]).toLocaleDateString('th-TH');
          let type = row[1];
          let color = type === 'ฝาก' ? 'text-success' : 'text-danger';
          let sign = type === 'ฝาก' ? '+' : '-';
          html += `
            <div class="timeline-item">
              <div class="d-flex justify-content-between">
                <div><span class="fw-bold">${type}เงิน</span><div class="small text-muted">${dateStr}</div></div>
                <div class="fw-bold ${color}">${sign}฿${Number(row[2]).toLocaleString('th-TH')}</div>
              </div>
            </div>`;
        });
        stList.innerHTML = html;
      } else {
        document.getElementById('st-last-active').innerHTML = `<i class="bi bi-info-circle"></i> ยังไม่มีประวัติทำรายการ`;
        stList.innerHTML = "<div class='text-center text-muted small py-3'>ยังไม่มีข้อมูลการทำรายการ</div>";
      }
    }
  </script>
</body>
</html>
